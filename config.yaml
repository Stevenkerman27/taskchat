# API密钥配置
# 如无bug禁止更改此文件

# 默认提供商
default_provider: "deepseek"

# 提供商配置
providers:
  deepseek:
    name: "DeepSeek"
    api_key_env: "DS_API_KEY"
    base_url: "https://api.deepseek.com"
    models: ["deepseek-chat", "deepseek-reasoner"]
    default_model: "deepseek-chat"
    features:
      reasoning:
        type: "boolean"  # OpenAI格式
        default: false
    defaults:
      temperature: 1.0
      max_tokens: 4096
    constraints:
      temperature_range: [0.0, 1.5]

  Silicon_flow:
    name: "Silicon_flow"
    api_key_env: "SF_API_KEY"
    base_url: "https://api.siliconflow.com/v1"
    models: ["deepseek-ai/DeepSeek-V3.2", "zai-org/GLM-5", "moonshotai/Kimi-K2.5", "MiniMaxAI/MiniMax-M2.5", "Qwen/Qwen3-235B-A22B-Thinking-2507"]
    default_model: "moonshotai/Kimi-K2.5"
    features:
      reasoning:
        type: "boolean"
        default: false
    defaults:
      temperature: 1.0 
      max_tokens: 4096
    constraints:
      temperature_range: [0.0, 2.0]

ignore_gemini_for_now: |
  google:
    name: "Google Gemini"
    api_key_env: "GEMINI_API_KEY"
    base_url: "N/A"
    models: ["gemini-3-flash-preview"]
    default_model: "gemini-3-flash-preview"
    features:
      reasoning:
        type: "enum"
        values: ["OFF", "SMALL", "MEDIUM", "LARGE"]
        default: "MEDIUM"
    defaults:
      temperature: 1.0  # Google推荐值
      max_tokens: 4096
    constraints:
      temperature_range: [0.0, 2.0]
      reasoning_required: false