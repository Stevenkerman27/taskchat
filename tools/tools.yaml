# 工具配置文件
# 用于管理DeepSeek等模型的tool call功能
# 遵循DeepSeek strict模式JSON Schema格式要求

# 预定义工具库
tools:
  # 文件系统工具
  ls:
    name: "ls"
    description: "列出指定目录下的文件和文件夹"
    parameters:
      type: "object"
      properties:
        path:
          type: ["string", "null"]
          description: "目录路径（相对路径），默认为当前目录"
      required: ["path"]
      additionalProperties: false
    implementation: "system"
    category: "filesystem"

  # 文件移动工具
  move_file:
    name: "move_file"
    description: "移动或重命名文件/目录"
    parameters:
      type: "object"
      properties:
        source:
          type: "string"
          description: "源文件/目录路径（相对路径）"
        destination:
          type: "string"
          description: "目标文件/目录路径（相对路径）"
      required: ["source", "destination"]
      additionalProperties: false
    implementation: "system"
    category: "filesystem"

  # 文件读取工具
  read_file:
    name: "read_file"
    description: "读取指定文件的文本内容"
    parameters:
      type: "object"
      properties:
        filepath:
          type: "string"
          description: "文件路径（相对路径）"
      required: ["filepath"]
      additionalProperties: false
    implementation: "system"
    category: "filesystem"

  # 文件写入工具
  write_file:
    name: "write_file"
    description: "写入或修改文件内容"
    parameters:
      type: "object"
      properties:
        filepath:
          type: "string"
          description: "文件路径（相对路径）"
        content:
          type: "string"
          description: "要写入的内容"
      required: ["filepath", "content"]
      additionalProperties: false
    implementation: "system"
    category: "filesystem"

  # 时间工具
  get_time:
    name: "get_time"
    description: "获取当前日期和时间"
    parameters:
      type: "object"
      properties: {}
      required: []
      additionalProperties: false
    implementation: "system"
    category: "information"
  
  # 网络工具
  ping:
    name: "ping"
    description: "测试网络连接"
    parameters:
      type: "object"
      properties:
        host:
          type: "string"
          description: "主机名或IP地址"
      required: ["host"]
      additionalProperties: false
    implementation: "system"
    category: "network"

# 工具组配置
tool_groups:
  basic:
    name: "基础工具"
    description: "常用基础工具"
    tools: ["ls", "get_time", "ping"]
  
  filesystem:
    name: "文件系统工具"
    description: "文件操作相关工具"
    tools: ["ls", "move_file", "read_file", "write_file"]

# 默认工具配置
defaults:
  # 默认启用的工具组
  enabled_groups: ["basic", "filesystem"]
  
  # 默认启用的单个工具
  enabled_tools: []
  
  # 工具调用配置
  tool_call_config:
    max_iterations: 3  # 最大工具调用迭代次数
    auto_execute: false  # 是否自动执行工具
    require_confirmation: true  # 是否需要用户确认
  
  # 工具结果处理
  result_handling:
    auto_fill_input: true  # 自动用工具返回值填充输入框
    ignore_user_input: true  # 忽略用户输入，使用工具结果
    require_send_click: true  # 需要点击发送按钮才发送

# 工具实现函数映射
implementations:
  system:
    ls: "tools_impl.list_directory"
    get_time: "tools_impl.get_current_time"
    ping: "tools_impl.ping"
    move_file: "tools_impl.move_file"
    read_file: "tools_impl.read_file_content"
    write_file: "tools_impl.write_file_content"
